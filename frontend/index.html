<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Lyrics Recommendation</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link rel="stylesheet" href="style.css">
	<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
	<div class="app-bg">
		<header class="py-4 py-md-5">
			<div class="container-lg">
				<div class="brand-wrap">
					<div class="brand-mark" aria-hidden="true">♪</div>
					<div>
						<h1 class="brand-title">LyricLens</h1>
						<p class="brand-tag mb-0">Find similar songs in one step, by title or by lyric snippet.</p>
					</div>
				</div>
			</div>
		</header>

		<main class="container-lg pb-5">
			<section class="search-panel p-3 p-md-4">
				<div class="d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3 mb-4">
					<div>
						<p class="kicker mb-1">Quick Access</p>
						<h2 class="h4 mb-0 section-title">Get recommendations fast</h2>
					</div>
					<small class="hint">Tip: Press Enter to search instantly.</small>
				</div>

				<nav class="mode-switch" role="tablist" aria-label="Recommendation modes">
					<button class="tab-btn active" data-target="by-title" role="tab" aria-selected="true" type="button">By Title</button>
					<button class="tab-btn" data-target="by-lyrics" role="tab" aria-selected="false" type="button">By Lyrics</button>
				</nav>

				<section id="by-title" class="tab-panel mt-3">
					<form id="titleForm" class="row g-2" onsubmit="return false;">
						<div class="col-12 col-md-9">
							<label class="form-label" for="songTitle">Song title</label>
							<input id="songTitle" class="form-control form-control-lg" type="search" placeholder="e.g. Someone Like You" aria-label="Song title">
						</div>
						<div class="col-12 col-md-3 d-flex align-items-end">
							<button id="titleSearch" class="btn btn-main btn-lg w-100" type="button">Recommend</button>
						</div>
					</form>
					<div id="titleResults" class="results-grid row g-3 mt-1" aria-live="polite"></div>
				</section>

				<section id="by-lyrics" class="tab-panel mt-3" hidden>
					<form id="lyricsForm" class="row g-2" onsubmit="return false;">
						<div class="col-12">
							<label class="form-label" for="lyricsInput">Paste lyrics</label>
							<textarea id="lyricsInput" class="form-control" rows="5" placeholder="Paste lyrics here" aria-label="Lyrics input"></textarea>
						</div>
						<div class="col-12 col-md-3 ms-md-auto">
							<button id="lyricsSearch" class="btn btn-main w-100" type="button">Find Similar</button>
						</div>
					</form>
					<div id="lyricsResults" class="results-grid row g-3 mt-1" aria-live="polite"></div>
				</section>
			</section>
		</main>
	</div>

	<div id="toast-container" aria-hidden="true"></div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
	<script src="app.js" defer></script>
</body>
</html>
